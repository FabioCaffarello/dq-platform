# path: docker-compose.yml
#
# Local development substrate for the DQ Platform.
#
# Wires up the Yes-row capabilities from the ADR-0010 capability
# matrix. Image picks below are commodity emulators selected to
# satisfy specific capabilities; they are flagged as a Phase 2
# scaffolding choice and can be swapped in a future commit so long
# as the ADR-0010 capability matrix is preserved.
#
# Image references currently use tags (not digests). Digest pinning
# is a follow-up sub-decision of ADR-0008 (Git host / registry
# primitives) and lands before Phase 3 hard-wires the byte-equality
# CI gate.

services:

  # ADR-0010 capability: "Pub/Sub publish/subscribe" (Yes).
  # The Pub/Sub emulator from the cloud SDK image. Exposes a REST
  # surface on :8085 for publish, subscribe, pull, and ack.
  pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: dq-pubsub
    command:
      - /bin/bash
      - -c
      - >
        gcloud beta emulators pubsub start
        --host-port=0.0.0.0:8085
        --project=dq-local
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ADR-0010 capabilities (with known fidelity gap; see below):
  #   - "Object store: by-hash immutability with sha256" (Yes).
  #   - "Object store: generation-conditional pointer write" — the
  #     ADR-0010 matrix lists this as Yes, but Phase 2's emulator
  #     evaluation found commodity emulators do not faithfully
  #     enforce ifGenerationMatch preconditions on overwrite:
  #       * fsouza/fake-gcs-server (selected here): supports the
  #         full object API surface — bucket/object create, read,
  #         delete, content-addressed paths — and accepts the
  #         ifGenerationMatch query parameter without error, but
  #         does not enforce it (stale writes succeed). This
  #         covers round-trip + by-hash; CAS enforcement does not
  #         run locally.
  #       * gcr.io/cloud-storage-image/storage-testbench:
  #         enforces preconditions but is gated by Google
  #         Artifact Registry auth not available to commodity
  #         contributor workflows.
  #       * oittaa/gcp-storage-emulator: enforces preconditions
  #         but does not implement the /upload/storage/v1/...
  #         media upload endpoint that the ADR-0005 publication
  #         primitive relies on.
  #     Selected image: fsouza/fake-gcs-server. Full-fidelity CAS
  #     validation runs in the sandbox-required CI lane (matches
  #     the existing pattern documented for the tabular-store
  #     lazy-view row).
  #     Phase 2 follow-up: revise ADR-0010 to reflect this
  #     emulator-fidelity reality (Object-store generation-
  #     conditional row from Yes → Partial). Tracked as B1-11
  #     in studies/foundation/06-decision-log.md.
  object-store:
    image: fsouza/fake-gcs-server:latest
    container_name: dq-object-store
    command:
      - -scheme
      - http
      - -port
      - "4443"
      - -public-host
      - "localhost:4443"
      - -external-url
      - "http://localhost:4443"
    ports:
      - "4443:4443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:4443/storage/v1/b || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ADR-0010 capability: "Tabular store: append-only writes" (Yes).
  # The lazy-view row from ADR-0010 is marked Partial; this
  # emulator covers the append + basic query surface needed for
  # local smoke tests. Full lazy-view fidelity (ROW_NUMBER OVER
  # PARTITION BY ... ORDER BY recorded_at DESC per ADR-0003) is
  # validated in the sandbox-required CI lane.
  tabular-store:
    image: ghcr.io/goccy/bigquery-emulator:latest
    container_name: dq-tabular-store
    command:
      - --project=dq-local
      - --port=9050
    ports:
      - "9050:9050"
    # No in-container healthcheck: the emulator image is distroless
    # and ships no shell or http client. `make up --wait` treats a
    # container without a healthcheck as ready once it reaches
    # "running" state; real readiness is verified by
    # scripts/smoke/tabular-store-smoke.sh, which polls the
    # emulator's API surface from the host.

  # ADR-0028 capabilities (event-stream substrate row for record-
  # oriented evaluation per Wave-S ADR-0024):
  #   - "Event stream: publish + subscribe with consumer groups"
  #     (Yes).
  #   - "Event stream: per-partition offset tracking with seek"
  #     (Yes).
  #   - "Event stream: watermark / lateness semantics" (Partial —
  #     the engine-side watermark math is portable across the
  #     local emulator; full broker-set-timestamp-authority
  #     semantics are validated in the sandbox-required CI lane).
  #
  # Selected image: redpandadata/redpanda (single-broker KRaft
  # mode; no separate ZooKeeper). Image choice is a scaffolding
  # detail per ADR-0028 §"Wave-3 scaffolding contract"; can be
  # swapped without re-opening the ADR so long as the three rows
  # above are preserved. Port 9092 is the Kafka-wire bootstrap
  # address; port 9644 exposes the admin API for local
  # inspection.
  event-stream:
    image: redpandadata/redpanda:latest
    container_name: dq-event-stream
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=localhost:33145
      - --pandaproxy-addr=0.0.0.0:8082
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers", "localhost:9092"]
      interval: 5s
      timeout: 3s
      retries: 20

  # B2-33 + ADR-0045 §"Local-development integration": the
  # observability stack that exercises the baseline dashboard
  # locally. Foundation 05 §"Local development substrate posture"
  # named Prometheus + Grafana as the intended local trio
  # (alongside Jaeger, which is deferred until tracing emission
  # lands). Adding Jaeger is a follow-up if/when tracing arrives.
  #
  # # Where the engine binary lives in this stack
  #
  # The dq-engine binary is NOT a compose service — it runs on
  # the host (`make build-engine && ./bin/dq-engine`) or in a
  # separate cluster. Prometheus uses
  # `host.docker.internal:8080` to scrape it; the
  # `extra_hosts: host-gateway` mapping makes that hostname
  # resolve from inside the container on both Linux and macOS.
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: dq-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  # Grafana 10+ auto-provisions the data source + dashboard from
  # mounted YAML/JSON files. The Prometheus data source is wired
  # automatically (matches the dq-prometheus UID baseline.json
  # references); the BigQuery data source is plugin-installed but
  # left unconfigured — operators wire it in the UI against a
  # sandbox GCP project per ADR-0045 §"Data sources".
  #
  # Default Grafana credentials at first start are admin/admin
  # (Grafana prompts to reset). For a hands-off local-dev
  # experience operators can set GF_SECURITY_ADMIN_PASSWORD via
  # env override; the compose default trusts the typical
  # localhost-only access pattern.
  grafana:
    image: grafana/grafana:10.4.3
    container_name: dq-grafana
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_INSTALL_PLUGINS: "grafana-bigquery-datasource"
      GF_USERS_DEFAULT_THEME: "light"
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30

# Notes on capability-matrix coverage:
#
# - Pub/Sub publish/subscribe (Yes) ............ pubsub
# - Object store: generation-conditional (Yes in ADR-0010, but
#   commodity emulators have a fidelity gap — see object-store
#   comment block above; CAS enforcement runs in the sandbox-
#   required CI lane until an emulator gap is closed or ADR-0010
#   is amended to Partial).
# - Object store: by-hash sha256 immutability .. object-store
# - Tabular store: append-only writes .......... tabular-store
# - Tabular store: lazy view (Partial) ......... tabular-store (best effort; sandbox for full fidelity)
# - Event stream: publish + subscribe + groups . event-stream (ADR-0028)
# - Event stream: per-partition offset tracking. event-stream (ADR-0028)
# - Event stream: watermark / lateness (Partial) event-stream (engine-side math; sandbox for broker-set-timestamp authority)
# - OIDC / service identity (No) ............... not stood up locally; sandbox required.
# - Unforgeable linter image pin (Partial) ..... tag-based here; production pin lives in the host registry per ADR-0008.
# - Structured logs / metrics endpoint (Yes) ... engine-side; lands in Phase 4 (engine runtime).
# - Orphan-run detection polling (Yes) ......... engine-side; lands in Phase 4.
# - Cost-ceiling enforcement (Yes) ............. engine-side; lands in Phase 4.
