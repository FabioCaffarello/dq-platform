# path: deploy/observability/grafana/provisioning/dashboards/dq-dashboards.yml
#
# Grafana dashboard-provider config that auto-loads dashboard
# JSON files from the mounted directory. The `path` value points
# at where the Grafana container expects the JSON files; the
# Compose service definition mounts
# `deploy/dashboards/` to that location read-only so the
# operator-facing artefact (`deploy/dashboards/baseline.json`
# per B2-24 / ADR-0045) is the source of truth — no copy lives
# under `deploy/observability/`.
#
# `allowUiUpdates: false` means changes made in the Grafana UI
# are NOT persisted back to the mounted file (the JSON is the
# git-tracked source of truth). Operators iterating on a
# dashboard edit `deploy/dashboards/baseline.json` directly and
# `docker compose restart grafana` to reload.

apiVersion: 1

providers:
  - name: dq-baseline
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
