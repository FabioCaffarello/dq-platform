# path: deploy/base/deployment.yaml
#
# Engine Deployment for the DQ Platform engine binary. Plain
# Kubernetes YAML so the base is tool-neutral — overlays at
# W3-P7c (Kustomize / Helm / other per B2-8) reference this
# document.
#
# The container env is sourced from the `dq-engine-env`
# ConfigMap (see configmap.yaml). The base ConfigMap has no
# data; overlays patch it to set DQ_ENV + (for local only) the
# emulator-host overrides.
#
# Probes wire /healthz (liveness) and /readyz (readiness) per
# ADR-0014 §4. The container port 8080 matches
# `env.Local.HTTPAddr` from W3-P7a's typed env package.
#
# Image references the Docker Hub registry per ADR-0054
# (amends ADR-0042 Clause 1's image-name row + closes
# Consequence 10 §OQ-1). The image is pushed by the
# `engine-image` workflow on every `engine-v*` git tag event;
# until the first such tag pushes, the tag below references a
# not-yet-existing image — same structural posture the
# previous `:placeholder` state carried, with the correct path.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dq-engine
  labels:
    app.kubernetes.io/name: dq-engine
    app.kubernetes.io/component: engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dq-engine
      app.kubernetes.io/component: engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dq-engine
        app.kubernetes.io/component: engine
    spec:
      serviceAccountName: dq-engine
      containers:
        - name: dq-engine
          # Published image per ADR-0054 Clause 2's two-part
          # image-name shape: local builds keep `dq-engine:<tag>`
          # (ADR-0042 Clause 1's unchanged row); the registry-
          # prefixed shape below is what the engine-image workflow
          # pushes and what `kubectl apply` resolves. The `0.1.0`
          # tag matches the current `EngineVersion` baseline in
          # engine/internal/env/{local,qa,prod}.go per ADR-0054
          # Notes "Why 0.1.0 as the base manifest tag". Overlays
          # at deploy/overlays/{local,qa,prod}/ may patch the
          # reference (pin by digest, override the tag per env)
          # per ADR-0042 Clause 4 + ADR-0019 Kustomize overlay
          # framing.
          image: docker.io/fabiocaffarello/dq-engine:0.1.0
          # IfNotPresent suits local dev with a locally-built
          # image. Overlays for qa/prod set this to "Always" or
          # pin by digest for the production posture.
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: dq-engine-env
          volumeMounts:
            # Writable /tmp so the Go runtime and the GCP SDKs
            # have somewhere to spill (chunked-upload retries,
            # pprof, os.CreateTemp). The volume is an emptyDir
            # — no persistence across restarts. Pairs with
            # readOnlyRootFilesystem: true below: the rootfs
            # stays immutable while /tmp is writable.
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            # UID 65532 is the distroless nonroot UID. The engine
            # image (B2-28: engine/Dockerfile) uses
            # gcr.io/distroless/static-debian12:nonroot as the
            # runtime base, where UID 65532 is the `nonroot` user
            # — pin matches the image's default user.
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
