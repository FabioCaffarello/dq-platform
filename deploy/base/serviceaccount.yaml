# path: deploy/base/serviceaccount.yaml
#
# Engine ServiceAccount. The base just declares the account; the
# per-env GCP IAM binding (Workload Identity, the
# `iam.gke.io/gcp-service-account` annotation, the per-project
# IAM role grants for BigQuery / GCS / Pub/Sub) is operational
# work that the session provisioning each env's GCP project
# attaches to this SA. Per B1-4 MD-3, each env has its own GCP
# project and its own service-account email; the operational
# session adds an overlay-side patch annotating this SA with the
# right email.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dq-engine
  labels:
    app.kubernetes.io/name: dq-engine
    app.kubernetes.io/component: engine
  # Per-env operational sessions add annotations here, e.g.:
  #   annotations:
  #     iam.gke.io/gcp-service-account: dq-engine@<gcp-project>.iam.gserviceaccount.com
