# path: deploy/overlays/prod/serviceaccount-annotations.yaml
#
# Prod ServiceAccount patch. Adds the Workload Identity annotation
# binding the K8s SA to the prod-project GCP service account per
# B1-4 MD-3. The `dq-prod-PLACEHOLDER` project ID mirrors the
# placeholder in engine/internal/env/prod.go — both are replaced
# together by the operational session that provisions the real
# prod GCP project.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dq-engine
  annotations:
    iam.gke.io/gcp-service-account: dq-engine@dq-prod-PLACEHOLDER.iam.gserviceaccount.com
