# path: deploy/overlays/qa/serviceaccount-annotations.yaml
#
# QA ServiceAccount patch. Adds the Workload Identity annotation
# binding the K8s SA to the qa-project GCP service account per
# B1-4 MD-3. The `dq-qa-PLACEHOLDER` project ID mirrors the
# placeholder in engine/internal/env/qa.go — both are replaced
# together by the operational session that provisions the real
# qa GCP project.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dq-engine
  annotations:
    iam.gke.io/gcp-service-account: dq-engine@dq-qa-PLACEHOLDER.iam.gserviceaccount.com
