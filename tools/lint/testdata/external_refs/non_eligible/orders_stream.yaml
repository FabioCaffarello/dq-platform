# Cross-check #12: aggregation_ref rejected — aggregation is not
# declared external-eligible in the catalog (only schema is).
version: 2
entity: orders_stream
mode: record
source:
  type: kafka
  topic: orders.events.v1
  consumer_group: dq-orders-stream
  window:
    type: tumbling
    duration: 1m
    lateness_tolerance: 30s
checks:
  - check_id: schema_present
    kind: record.schema_conformance
    params:
      schema:
        type: object
      aggregation_ref: schemas/aggregation.json
