# path: tools/lint/testdata/v2/invalid/params-missing-required.yaml
# Cross-check #12: record.schema_conformance requires exactly one
# of params.schema or params.schema_ref. Omitting both fails the
# external-references cross-check per ADR-0044. (As of B2-32, the
# catalog no longer marks `schema` as JSON-Schema-required since
# `schema_ref` is an equivalent alternative; cross-check #12
# carries the "at least one is present" obligation.)
version: 2
entity: orders_stream
mode: record
source:
  type: kafka
  topic: orders.events.v1
  consumer_group: dq-orders-stream
  window:
    type: tumbling
    duration: 1m
    lateness_tolerance: 30s
checks:
  - check_id: schema_present
    kind: record.schema_conformance
    # params block omitted on purpose; catalog requires params.schema.
