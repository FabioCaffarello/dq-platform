# path: .github/workflows/engine-image.yml
#
# Builds the dq-engine container image on every pull request and
# every push to main per ADR-0042 §"Clause 1" + B2-28's slice, and
# (subject to the dual-gate below) publishes it to Docker Hub on
# every `engine-v*` git tag push per ADR-0054 §"Clause 3 —
# Push-step behavioral contract" (the amendment to ADR-0042 that
# closed Consequence 10 §OQ-1 by committing Docker Hub
# `fabiocaffarello` as the registry).
#
# Two-stage activation matches the sandbox.yml /
# lint-reachability.yml workflow-discipline pattern:
#
# 1. Build + inspect — runs on every PR + main push + engine-v*
#    tag push. Consumes no secret. The Required-check candidate
#    for branch protection is this stage (its existence pre-dates
#    ADR-0054).
# 2. Publish — runs only when the push event is an `engine-v*`
#    tag AND the operator has opened the publish gate. The gate
#    is opened by either setting `vars.ENGINE_IMAGE_PUBLISH_ENABLED`
#    to `'true'` or by provisioning `secrets.DOCKERHUB_TOKEN`. With
#    neither set, the publish steps silently skip — a notice step
#    surfaces the skip in the run summary so the gate state is
#    visible to the operator. **Publish is explicitly NOT part of
#    the default PR gate** and is not a required check on branch
#    protection without explicit operator sign-off.

name: engine-image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['engine-v*']

jobs:
  build:
    name: build dq-engine image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: make build-engine-image
        run: make build-engine-image

      - name: Inspect image
        id: inspect
        run: |
          # Resolve the same tag the Makefile's build-engine-image
          # target produced. Piping `git describe` through `sed`
          # masks the describe command's exit code, so we capture
          # describe's output + status separately and fall back to
          # the short SHA explicitly when no engine-v* tag matches.
          set -euo pipefail
          if git_tag="$(git describe --tags --match 'engine-v*' --exact-match 2>/dev/null)"; then
            tag="${git_tag#engine-v}"
          else
            tag="$(git rev-parse --short HEAD)"
          fi
          echo "Inspecting dq-engine:$tag"
          docker inspect "dq-engine:$tag" \
            --format 'User={{.Config.User}} Entrypoint={{.Config.Entrypoint}}'
          # The User field must be `nonroot:nonroot` per ADR-0042
          # Clause 1 + deploy/base/deployment.yaml's runAsUser 65532
          # pin. Fail the lane loudly if the image base changes
          # silently.
          actual="$(docker inspect "dq-engine:$tag" --format '{{.Config.User}}')"
          if [ "$actual" != "nonroot:nonroot" ]; then
            echo "::error::image user is $actual; want nonroot:nonroot per ADR-0042 Clause 1"
            exit 1
          fi
          # Surface the resolved tag for the conditional push step
          # below. Outputs are how step results flow forward in
          # GitHub Actions; emitting `tag` here keeps the push step
          # free of git-describe duplication.
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # --- Publish stage (ADR-0054 §"Clause 3" + dual-gate) ----
      # Dual-gate (matches sandbox.yml + lint-reachability.yml
      # discipline): activates only when (a) the push event is an
      # `engine-v*` tag (Clause 3 item 3 — tagged-build-only) AND
      # (b) the publish gate is open — either
      # `vars.ENGINE_IMAGE_PUBLISH_ENABLED == 'true'` or
      # `secrets.DOCKERHUB_TOKEN` is non-empty. With neither set,
      # the publish steps silently skip; the notice step below
      # surfaces the skip in the run summary so the gate state is
      # visible. The build + inspect stage above is unaffected by
      # this gate.

      - name: Publish gate — notice when open without credentials
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'engine-v') && !(vars.ENGINE_IMAGE_PUBLISH_ENABLED == 'true' || secrets.DOCKERHUB_TOKEN != '')
        run: |
          {
            echo "## ADR-0054 publish stage — skipped"
            echo ""
            echo "An \`engine-v*\` tag was pushed, but the publish gate is closed."
            echo ""
            echo "To open the gate, either:"
            echo ""
            echo "- set repository variable \`ENGINE_IMAGE_PUBLISH_ENABLED\` to \`true\`, or"
            echo "- provision repository secret \`DOCKERHUB_TOKEN\` (and \`DOCKERHUB_USERNAME\`)."
            echo ""
            echo "Build + inspect succeeded; no image was published. This skip is by design — see ADR-0054 Notes \"Publish-gate dual-authorization\"."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to Docker Hub
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'engine-v') && (vars.ENGINE_IMAGE_PUBLISH_ENABLED == 'true' || secrets.DOCKERHUB_TOKEN != '')
        uses: docker/login-action@v3
        with:
          # ADR-0054 Clause 5 + Notes "CI secret names" pin these
          # two secret names. The operator provisions both in the
          # repository secrets store; missing username while the
          # token is set (or vice versa) fails this step loudly so
          # the misconfiguration is visible.
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push dq-engine image to Docker Hub
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'engine-v') && (vars.ENGINE_IMAGE_PUBLISH_ENABLED == 'true' || secrets.DOCKERHUB_TOKEN != '')
        run: |
          set -euo pipefail
          tag="${{ steps.inspect.outputs.tag }}"
          published="docker.io/fabiocaffarello/dq-engine:$tag"
          docker tag "dq-engine:$tag" "$published"
          docker push "$published"
          # Surface the pushed image's digest per ADR-0054 Clause 3
          # item 4. Reproducibility for deploy/overlays/ that pin
          # by digest depends on this line being readable in the
          # workflow run summary.
          digest="$(docker inspect "$published" --format '{{index .RepoDigests 0}}')"
          {
            echo "## ADR-0054 push step"
            echo ""
            echo "- Tag: \`$published\`"
            echo "- Digest: \`$digest\`"
          } >> "$GITHUB_STEP_SUMMARY"
